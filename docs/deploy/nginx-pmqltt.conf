# Nginx reverse proxy — PM-QLTT (Windows)
# Copy nội dung vào conf của site hoặc include từ nginx.conf
# Điều kiện: PM2 frontend :3000, backend Node :5000

# map cho WebSocket (Socket.IO)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    # Sau khi có chứng chỉ, bật thêm:
    # listen 443 ssl;
    # ssl_certificate     C:/nginx/ssl/pmqltt.fullchain.pem;
    # ssl_certificate_key C:/nginx/ssl/pmqltt.key;

    # Mọi Host trỏ vào IP máy này phải có trong server_name (vd thêm pmqltt.kit.vn)
    server_name pmqltt.lcit.vn pmqltt.kit.vn;

    # Tăng nếu upload file lớn
    client_max_body_size 50M;

    # --- Backend: Socket.IO (đặt trước location /) ---
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Backend: API + auth + file tĩnh uploads ---
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:5000/health;
        proxy_set_header Host $host;
    }

    # --- Frontend: React (serve -s build) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
